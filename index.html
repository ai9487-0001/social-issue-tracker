<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>社會議題追蹤站</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="page">
    <header class="hero">
      <div>
        <div class="badge-row">
          <span class="badge">真實資料版</span>
          <span class="badge badge-soft">Netlify 可部署</span>
          <span class="badge badge-soft">新聞 + Threads</span>
        </div>
        <h1>社會議題追蹤站</h1>
        <p class="hero-text">
          以社工／公益議題為主，整合公開新聞與 Threads 關鍵字結果，幫助更多人快速看見值得關注的社會案件、困難與資源缺口。
        </p>
      </div>
      <div class="hero-card">
        <div class="hero-stat-label">目前重點</div>
        <div class="hero-stat-value">社工／公益</div>
        <p>Threads 來源已預留並可啟用；若未設定 token，網站會自動只顯示新聞來源。</p>
      </div>
    </header>

    <section class="toolbar">
      <div class="search-wrap">
        <input id="keywordInput" type="text" placeholder="輸入關鍵字，例如：社工、家暴、兒少保護、長照" />
        <select id="sourceSelect">
          <option value="all">全部來源</option>
          <option value="news">只看新聞</option>
          <option value="threads">只看 Threads</option>
        </select>
        <button id="searchBtn">搜尋</button>
      </div>
      <div class="chips" id="presetChips">
        <button class="chip active" data-keyword="社工">社工</button>
        <button class="chip" data-keyword="公益">公益</button>
        <button class="chip" data-keyword="家暴">家暴</button>
        <button class="chip" data-keyword="兒少保護">兒少保護</button>
        <button class="chip" data-keyword="長照">長照</button>
        <button class="chip" data-keyword="街友">街友</button>
      </div>
    </section>

    <section class="status-row">
      <div id="statusText">正在載入資料...</div>
      <div id="resultCount"></div>
    </section>

    <main>
      <div id="cards" class="cards"></div>
      <div id="emptyState" class="empty hidden">
        <h2>目前找不到資料</h2>
        <p>可試試其他關鍵字，例如：社工、公益、兒少保護、家暴、長照。</p>
      </div>
    </main>
  </div>

  <script src="app.js"></script>
</body>
</html>
